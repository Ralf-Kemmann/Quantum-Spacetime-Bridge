python_bin: "python3"

scripts:
  bmc08c_featuretable_script: "scripts/build_bmc08c_feature_table_from_m39x1_sign_sensitive_ring.py"
  mutual_knn_build_script: "scripts/build_bmc09c_mutual_knn_inputs_from_bmc08c.py"
  variant_runner: "scripts/bmc07_backbone_variation_runner.py"

data:
  bmc08c_featuretable_config: "data/bmc08c_m39x1_sign_sensitive_ring_config.yaml"
  mutual_knn_build_config: "data/bmc09c_mutual_knn_config.yaml"

run:
  output_root: "runs/BMC-09/BMC09c_mutual_knn_open"

sweep:
  k_values:
    - 2
    - 3
    - 4

base_runner_config:
  seed: 101

  graph:
    directed: false
    weight_column: "weight"
    source_column: "source"
    target_column: "target"

  perturbation:
    repeats: 50
    edge_swap_fraction: 0.10
    preserve_degree: true
    preserve_weight_multiset: true
    preserve_shell_counts: false

  readouts:
    arrangement_signal: "weighted_shell_gap_vs_weight_shuffle"
    shell_order_drift: "absolute_gap_to_shuffle_mean"
    diffusion_shift: "mean_abs_distance_to_optional_reference"
    pair_neighborhood_shift: "mean_abs_normalized_adjacency_to_optional_reference"

  decision:
    arrangement_signal_min: 0.05
    dominance_gap_min: 0.03
    minimum_repeat_count: 50
    minimum_arm_edge_count: 2

  backbone_variants:
    enabled: true
    variants:
      - variant_name: "strength_topk_6"
        method: "strength_topk"
        top_k: 6
      - variant_name: "strength_topalpha_025"
        method: "strength_topalpha"
        alpha: 0.25
      - variant_name: "strength_topalpha_050"
        method: "strength_topalpha"
        alpha: 0.50
