run:
  run_id: "BMC07b_coupling_arm_open"
  output_dir: "runs/BMC-07/BMC07b_coupling_arm_open"
  seed: 101

inputs:
  baseline_relational_table: "data/baseline_relational_table.csv"
  node_metadata: "data/node_metadata.csv"
  bmc04_reference_summary: null
  pair_neighborhood_matrix: null
  diffusion_distance_matrix: null

graph:
  directed: false
  weight_column: "weight"
  source_column: "source"
  target_column: "target"

backbone:
  method: "hint_or_strength_fallback"
  hint_column: "backbone_hint"
  alpha: 0.25
  minimum_backbone_fraction: 0.20
  maximum_backbone_fraction: 0.80

arms:
  evaluate_full_graph: true
  evaluate_backbone_only: true
  evaluate_off_backbone_only: true
  evaluate_coupling_only: true

perturbation:
  repeats: 20
  edge_swap_fraction: 0.10
  preserve_degree: true
  preserve_weight_multiset: true
  preserve_shell_counts: false

readouts:
  arrangement_signal: "weighted_shell_gap_vs_weight_shuffle"
  shell_order_drift: "absolute_gap_to_shuffle_mean"
  diffusion_shift: "mean_abs_distance_to_optional_reference"
  pair_neighborhood_shift: "mean_abs_normalized_adjacency_to_optional_reference"

decision:
  arrangement_signal_min: 0.05
  dominance_gap_min: 0.03
  minimum_repeat_count: 20
  minimum_arm_edge_count: 2
