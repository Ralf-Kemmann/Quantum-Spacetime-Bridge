# BMS-FU02 — Load-Bearing Pattern Analysis Config
# Date: 2026-05-01
# Project: Gravitation und RaumZeit / Quantum-Spacetime-Bridge

run:
  run_id: "BMS-FU02_load_bearing_pattern_analysis_open"
  output_dir: "runs/BMS-FU02/load_bearing_pattern_analysis_open"
  random_seed: 424242

inputs:
  fu01c_output_dir: "runs/BMS-FU01c/c60_motif_topology_extension_open"
  c60_nodes_csv: "data/bms_fu01_c60_nodes.csv"
  c60_edges_csv: "data/bms_fu01_c60_edges.csv"
  c60_faces_csv: "data/bms_fu01_c60_faces.csv"
  c60_graph_manifest_json: "data/bms_fu01_c60_graph_manifest.json"

selection:
  # Only real envelopes are used to define what the real diagnostic retains.
  # Null objects are used as contrast/background.
  include_construction_families:
    - "maximum_spanning_tree"
    - "mutual_knn"
    - "threshold"
    - "top_strength"
    - "graph_distance_shells"

  # Core-retention metrics are read from FU01c summaries. Edge/node pattern
  # scores are computed from FU01c edge inventories and selected constructions.
  positive_delta_threshold: 0.0
  strong_delta_threshold: 0.25
  cross_representation_min_count: 2

labels:
  topology_sensitive_representations:
    - "topology_only_equal_weight"
    - "graph_distance_similarity_d3"

  null_families:
    - "degree_preserving_rewire"
    - "edge_class_shuffle"
    - "motif_class_preserving_edge_swap_proxy"
    - "core_seeded_decoy"

outputs:
  edge_explanatory_features_csv: "bms_fu02_edge_explanatory_features.csv"
  node_explanatory_features_csv: "bms_fu02_node_explanatory_features.csv"
  edge_load_bearing_scores_csv: "bms_fu02_edge_load_bearing_scores.csv"
  node_load_bearing_scores_csv: "bms_fu02_node_load_bearing_scores.csv"
  null_resistance_profiles_csv: "bms_fu02_null_resistance_profiles.csv"
  cross_representation_carriers_csv: "bms_fu02_cross_representation_carriers.csv"
  candidate_structure_carriers_csv: "bms_fu02_candidate_structure_carriers.csv"
  motif_load_bearing_summary_csv: "bms_fu02_motif_load_bearing_summary.csv"
  run_manifest_json: "bms_fu02_run_manifest.json"
  warnings_json: "bms_fu02_warnings.json"
  resolved_config_yaml: "bms_fu02_config_resolved.yaml"
