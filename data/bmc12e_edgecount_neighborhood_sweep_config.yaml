# BMC-12e Edge-Count Neighborhood Sweep configuration

run_id: BMC12e_edgecount_neighborhood_sweep_open

python_bin: python3
variant_runner: scripts/bmc07_backbone_variation_runner.py

inputs:
  feature_table: data/bmc12_feature_table_with_derived_from_bmc08c.csv
  reference_node_metadata: data/bmc09d_threshold_hybrid_inputs/threshold_tau_03/node_metadata_real.csv

generated:
  input_root: data/bmc12e_edgecount_sweep_inputs
  config_root: data/bmc12e_edgecount_sweep_configs
  legacy_runner_output_root: runs/BMC-12e/edgecount_neighborhood_sweep_open/runner_outputs
  final_output_root: runs/BMC-12e/edgecount_neighborhood_sweep_open

node_id_column: node_id

features:
  - feature_mode_frequency
  - feature_length_scale
  - feature_shape_factor
  - feature_spectral_index

edge_counts:
  - 70
  - 75
  - 81
  - 87
  - 92

standardization:
  ddof: 0
  zero_std_policy: error

graph:
  directed: false
  weight_column: weight
  source_column: source
  target_column: target

perturbation:
  repeats: 50
  edge_swap_fraction: 0.10
  preserve_degree: true
  preserve_weight_multiset: true
  preserve_shell_counts: false

readouts:
  arrangement_signal: weighted_shell_gap_vs_weight_shuffle
  shell_order_drift: absolute_gap_to_shuffle_mean
  diffusion_shift: mean_abs_distance_to_optional_reference
  pair_neighborhood_shift: mean_abs_normalized_adjacency_to_optional_reference

decision:
  arrangement_signal_min: 0.05
  dominance_gap_min: 0.03
  minimum_repeat_count: 50
  minimum_arm_edge_count: 2

backbone_variants:
  enabled: true
  variants:
    - variant_name: strength_topk_6
      method: strength_topk
      top_k: 6
    - variant_name: strength_topalpha_025
      method: strength_topalpha
      alpha: 0.25
    - variant_name: strength_topalpha_050
      method: strength_topalpha
      alpha: 0.50

reference_decision:
  decision_label: backbone_localization_supported
  dominant_arm: backbone_only
