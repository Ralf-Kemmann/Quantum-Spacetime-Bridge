# BMS-ST01 — Structure Information Specificity Config
# Date: 2026-05-01
# Project: Gravitation und RaumZeit / Quantum-Spacetime-Bridge

run:
  run_id: "BMS-ST01_structure_information_specificity_open"
  output_dir: "runs/BMS-ST01/structure_information_specificity_open"
  random_seed: 161803

inputs:
  edge_table: "data/baseline_relational_table_real.csv"
  node_metadata: "data/node_metadata_real.csv"
  dataset_manifest: "data/bmc08_dataset_manifest.json"

columns:
  source: "source"
  target: "target"
  weight: "weight"
  edge_family: "edge_family"
  source_family: "source_family"
  target_family: "target_family"
  node_id: "node_id"
  node_family: "node_family"

reference_core:
  mode: "family_balanced_within_family_top_edges"
  edges_per_family: 3
  within_family_only: true
  families:
    - "RING"
    - "CAVITY"
    - "MEMBRANE"

construction_families:
  top_strength:
    enabled: true
    edge_counts: [6, 9, 12, 18, 26, 34]
  threshold:
    enabled: true
    thresholds: [0.20, 0.25, 0.30, 0.35, 0.40]
  mutual_knn:
    enabled: true
    k_values: [2, 3, 4, 6, 10]
  maximum_spanning_tree:
    enabled: true

null_families:
  degree_weight_preserving_rewire:
    enabled: true
    repeats: 50
    preserve_weight_multiset: true

  feature_structured_shuffle:
    enabled: true
    repeats: 50
    family_column: "node_family"
    shuffle_mode: "within_family"

  core_seeded_decoy:
    enabled: true
    repeats: 50
    seed_weight_quantile: 0.90
    seed_mode: "reference_core_pairs"
    preserve_global_edge_count: true

outputs:
  nodes_resolved_csv: "bms_st01_nodes_resolved.csv"
  edges_csv: "bms_st01_edges.csv"
  reference_core_edges_csv: "bms_st01_reference_core_edges.csv"
  core_metrics_csv: "bms_st01_core_metrics.csv"
  envelope_metrics_csv: "bms_st01_envelope_metrics.csv"
  real_vs_null_summary_csv: "bms_st01_real_vs_null_summary.csv"
  family_summary_csv: "bms_st01_family_summary.csv"
  null_family_inventory_csv: "bms_st01_null_family_inventory.csv"
  run_manifest_json: "bms_st01_run_manifest.json"
  warnings_json: "bms_st01_warnings.json"
  resolved_config_yaml: "bms_st01_config_resolved.yaml"
