  carrier_node_geometry_csv: "bms_fu02d_carrier_node_geometry.csv"
  carrier_face_geometry_csv: "bms_fu02d_carrier_face_geometry.csv"
  carrier_component_summary_csv: "bms_fu02d_carrier_component_summary.csv"
  carrier_role_adjacency_summary_csv: "bms_fu02d_carrier_role_adjacency_summary.csv"
  visualization_edges_csv: "bms_fu02d_visualization_edges.csv"
  run_manifest_json: "bms_fu02d_run_manifest.json"
  warnings_json: "bms_fu02d_warnings.json"
  resolved_config_yaml: "bms_fu02d_config_resolved.yaml"
