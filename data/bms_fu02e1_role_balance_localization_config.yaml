  carrier_face_count_abs: 1
  carrier_pentagon_face_count_abs: 1
  mixed_seam_boundary_face_count_abs: 1
  require_carrier_face_component_count: 1

scoring:
  component_mismatch_penalty: 4.0
  zero_std_scale: 1.0

outputs:
