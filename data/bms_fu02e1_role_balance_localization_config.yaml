run:
  run_id: "BMS-FU02e1_role_balance_localization_specificity_open"
  output_dir: "runs/BMS-FU02e1/role_balance_localization_specificity_open"

inputs:
  fu02e_output_dir: "runs/BMS-FU02e/carrier_role_null_localization_open"
  fu02d1_output_dir: "runs/BMS-FU02d1/face_parser_repair_and_face_localization_open"

profile:
  primary_metrics:
    - "carrier_face_count"
    - "carrier_pentagon_face_count"
    - "mixed_seam_boundary_face_count"
    - "largest_mixed_face_component_count"
    - "carrier_face_component_count"
