run:
  run_id: "M39x3c_ao_model_transfer"
  title: "M.3.9x.3c — AO-Modelltransfer-Check gegen finite square well"
  description: >
    Model-transfer run for Type B using a weakly anharmonic oscillator sweep
    as second standard model. The goal is to test whether the finite-square-well
    Type-B signal transfers to a distinct 1D model family or remains finite-square-
    well-specific so far.
  outdir: "runs/M39x3c_ao_model_transfer"
  random_seed: 1729
  overwrite: true

inputs:
  family_definitions_yaml: "configs/m39x3c_ao_model_transfer_families.yaml"

execution:
  enabled_blocks:
    - family_diagnostics
    - prediction_evaluation
    - spectral_type_summary
    - control_hardening_rules
    - model_transfer_evaluation
    - qualitative_jump_screen
  stop_on_error: true
  log_level: "INFO"

reporting:
  require_family_prediction_summary: true
  require_spectral_type_summary: true
  require_missing_cases_summary: true
  require_control_hardening_summary: true
  require_model_transfer_summary: true
  global_prediction_status_allowed_values:
    - "type_B_supported_by_model_transfer"
    - "type_B_partially_confirmed_by_model_transfer"
    - "type_B_qualitative_jump_candidate"
    - "type_B_fsw_specific_so_far"
    - "type_B_not_transferred_to_ao"

pairing:
  default_pairing_mode: "all_pairs"
  supported_pairing_modes:
    - "all_pairs"
    - "matched_pairs"
    - "nearest_pairs"
    - "degeneracy_safe_pairs"
    - "unique_abs_pairs"
    - "no_sign_mirror_pairs"
  defaults:
    exclude_self_pairs: true
    sort_pairs_canonically: true
    unique_unordered_pairs: true

markers:
  supported_markers:
    - "delta_p"
    - "abs_delta_p"
    - "delta_p2"
    - "abs_delta_p2"
    - "delta_E_quad"
    - "delta_k"
    - "abs_delta_k"
    - "delta_k2"
    - "abs_delta_k2"
    - "delta_omega"
    - "delta_lambda"

  default_marker_sets:
    type_A_ladder:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
      - "delta_E_quad"

    type_B_quadratic_nontrivial:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
      - "delta_E_quad"

    type_C_multiindex_structure:
      - "delta_k"
      - "abs_delta_k"
      - "delta_k2"
      - "abs_delta_k2"
      - "delta_omega"
      - "delta_lambda"

    type_D_regular_nonring:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
      - "delta_E_quad"

strength_scoring:
  absolute_strength:
    method: "rank_separation_score"
    higher_is_better: true
    normalize_to_unit_interval: true

  relative_dominance:
    method: "bootstrap_win_fraction"
    higher_is_better: true

  support_thresholds:
    absolute_support_min: 0.60
    dominance_stable_min: 0.70
    dominance_margin_min: 0.05
    competitive_margin_max: 0.10
    type_b_distance_min: 0.10
    transfer_distance_max: 0.12

bootstrap:
  enabled: true
  n_bootstrap: 1000
  resample_level: "pair"
  confidence_level: 0.95
  stratified_by_branch_label: false

irregularity:
  enabled: true
  compute_measures:
    - "spacing_mean"
    - "spacing_std"
    - "spacing_cv"
    - "spacing_ratio"
    - "simple_unfolding_density"
    - "simple_rigidity_surrogate"
    - "grid_deviation_score"
    - "second_difference_curvature"

irregularity_levels:
  low:
    spacing_cv_max: 0.20
  low_to_moderate:
    spacing_cv_max: 0.45
  moderate:
    spacing_cv_min: 0.15
    spacing_cv_max: 0.60
  moderate_to_high:
    spacing_cv_min: 0.20
  high:
    spacing_cv_min: 0.50

prediction_logic:
  allowed_match_status_values:
    - "supported"
    - "partially_supported"
    - "open"
    - "stressed"
    - "failed"

  supported_rules:
    require_expected_relative_winner: true
    allow_expected_allowed_winners: true
    check_delta_p2_role: true
    check_irregularity_level: true
    check_direction_blindness_relevance: true

  default_open_conditions:
    - "family_status_placeholder"
    - "missing_control_case"
    - "insufficient_data"

anharmonic_oscillator_sweep:
  family_id: "TB3_ANHARMONIC_OSCILLATOR_1D_SWEEP"
  spectral_type: "type_B_quadratic_nontrivial"
  candidate_role: "reserve_transfer_check"
  sweep_mode: "anharmonic_strength_only"

  fixed_parameters:
    mass: 1.0
    omega0: 1.0

  regimes:
    - regime_id: "AO_WEAK"
      regime_label: "weak_near_regular"
      anharmonic_strength: 0.05
      expectation: "near_regular_with_first_type_B_signal"

    - regime_id: "AO_INTERMEDIATE"
      regime_label: "intermediate_transfer_candidate"
      anharmonic_strength: 0.12
      expectation: "best_transfer_candidate"

    - regime_id: "AO_STRONG"
      regime_label: "strong_edge_case"
      anharmonic_strength: 0.22
      expectation: "strong_nontriviality_edge_case"

transfer_references:
  type_A_reference:
    family_id: "ER1_RING"
    variant_id: "RING_SIGNED"

  type_D_reference:
    family_id: "TD1_1D_BOX"
    variant_id: "BOX_STANDARD"

  fsw_reference:
    family_id: "TB2_FINITE_SQUARE_WELL_1D_SWEEP"
    regime_id: "FSW_INTERMEDIATE"

regime_prediction_profiles:
  AO_WEAK:
    expected_relative_winner: "delta_p"
    expected_allowed_winners:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
    expected_delta_p2_role: "weak_transfer_signal_possible"
    expected_irregularity_level: "low_to_moderate"
    expected_regime_interpretation: "near_regular"

  AO_INTERMEDIATE:
    expected_relative_winner: "open"
    expected_allowed_winners:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
    expected_delta_p2_role: "best_transfer_candidate"
    expected_irregularity_level: "moderate"
    expected_regime_interpretation: "transfer_candidate"

  AO_STRONG:
    expected_relative_winner: "open"
    expected_allowed_winners:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
    expected_delta_p2_role: "strong_nontriviality_edge_case"
    expected_irregularity_level: "moderate_to_high"
    expected_regime_interpretation: "edge_case_risk"

evaluation_targets:
  - "regime_id"
  - "anharmonic_strength"
  - "n_states"
  - "dominant_marker"
  - "delta_p2_relative_gain_vs_type_A"
  - "distance_to_type_D"
  - "distance_to_FSW_intermediate"
  - "observed_irregularity_level"
  - "prediction_match_status"
  - "qualitative_jump_candidate_flag"
  - "type_B_model_transfer_value"

derived_transfer_flags:
  - "delta_p2_relative_gain_vs_type_A"
  - "distance_to_type_D"
  - "distance_to_FSW_intermediate"
  - "observed_irregularity_level"
  - "dominant_marker_match_flag"
  - "qualitative_jump_candidate_flag"
  - "fsw_like_type_B_pattern_flag"
  - "model_transfer_support_flag"

ao_transfer_decision_rules:
  AO_WEAK:
    supported_if:
      - "prediction_match_status in [partially_supported, supported]"
      - "delta_p2_relative_gain_vs_type_A > 0"
    interpretation: "first_transfer_signal"

  AO_INTERMEDIATE:
    supported_if:
      - "prediction_match_status in [partially_supported, supported]"
      - "distance_to_type_D > 0"
      - "fsw_like_type_B_pattern_flag == true"
    strongly_supported_if:
      - "prediction_match_status == supported"
      - "distance_to_type_D > 0"
      - "distance_to_FSW_intermediate <= transfer_distance_max"
      - "model_transfer_support_flag == true"
    interpretation: "best_transfer_candidate"

  AO_STRONG:
    supported_if:
      - "prediction_match_status in [partially_supported, supported]"
      - "distance_to_type_D > 0"
    stressed_if:
      - "qualitative_jump_candidate_flag == true and edge_case_flag == true"
    interpretation: "strong_edge_case_test"

model_transfer_global_logic:
  type_B_supported_by_model_transfer:
    require:
      - "AO_INTERMEDIATE.model_transfer_support_flag == true"
      - "AO_INTERMEDIATE.prediction_match_status in [partially_supported, supported]"
      - "AO_INTERMEDIATE.distance_to_type_D > 0"

  type_B_partially_confirmed_by_model_transfer:
    require:
      - "at_least_one_ao_regime_has_positive_delta_p2_gain"
      - "at_least_one_ao_regime_has_positive_distance_to_type_D"
    allow_any:
      - "AO_INTERMEDIATE weaker_than_FSW_intermediate"
      - "transfer_pattern_visible_but_not_strong"

  type_B_qualitative_jump_candidate:
    trigger_any:
      - "AO_INTERMEDIATE.qualitative_jump_candidate_flag == true"
      - "AO_STRONG.qualitative_jump_candidate_flag == true"

  type_B_fsw_specific_so_far:
    trigger_any:
      - "all_ao_regimes.model_transfer_support_flag == false"
      - "all_ao_regimes.distance_to_type_D <= 0"

  type_B_not_transferred_to_ao:
    trigger_any:
      - "all_ao_regimes.delta_p2_relative_gain_vs_type_A <= 0"
      - "all_ao_regimes.prediction_match_status not in [partially_supported, supported]"

control_hardening:
  enabled: true
  type_A_reference_family: "ER1_RING"
  type_A_reference_variant: "RING_SIGNED"
  type_D_reference_family: "TD1_1D_BOX"
  type_D_reference_variant: "BOX_STANDARD"
  fsw_reference_family: "TB2_FINITE_SQUARE_WELL_1D_SWEEP"
  fsw_reference_variant: "FSW_INTERMEDIATE"

outputs:
  markdown_report: "m39x3c_ao_model_transfer_report.md"
  global_summary_json: "m39x3c_global_summary.json"
  family_prediction_summary_csv: "m39x3c_family_prediction_summary.csv"
  spectral_type_summary_csv: "m39x3c_spectral_type_summary.csv"
  marker_summary_csv: "m39x3c_marker_summary.csv"
  irregularity_summary_csv: "m39x3c_irregularity_summary.csv"
  bootstrap_summary_csv: "m39x3c_bootstrap_summary.csv"
  missing_cases_summary_csv: "m39x3c_missing_cases_summary.csv"
  control_hardening_summary_csv: "m39x3c_control_hardening_summary.csv"
  model_transfer_summary_csv: "m39x3c_model_transfer_summary.csv"
  source_notes_md: "m39x3c_source_notes.md"