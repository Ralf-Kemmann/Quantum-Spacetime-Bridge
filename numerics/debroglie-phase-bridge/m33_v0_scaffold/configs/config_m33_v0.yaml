    pair_contributions_existing: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit/pair_contributions.csv"
    pair_class_summary_existing: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit/pair_class_summary.csv"

  selection:
    branch_basis: "nearest_branch_readout"
    target_cases_per_branch: 3
    require_nearest_match: true
    require_soft_match: false
    ranking_primary: "soft_overlap_score"
    ranking_secondary: "hard_delta_alpha"

  grouping:
