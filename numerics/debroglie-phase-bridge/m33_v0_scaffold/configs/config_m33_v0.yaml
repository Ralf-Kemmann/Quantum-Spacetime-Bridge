    validation_csv: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/source_pair_kernel_alpha_validation.csv"

  export:
    sign_zero_tolerance: 1.0e-12
    require_pair_order: true
    drop_nonfinite_rows: false
    sort_rows: true
