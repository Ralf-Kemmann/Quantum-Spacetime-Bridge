m35c_soft_branch:
  enabled: true

  input:
    packet_fit_best: "runs/M33_V0_alpha_peak_robustness/M35b_packet_kernel/packet_fit_best.csv"

  branches:
    - id: "S1"
      left: 1.38
      right: 1.46
      center: 1.42
    - id: "S2"
      left: 1.55
      right: 1.66
      center: 1.60
    - id: "S3"
      left: 1.72
      right: 1.82
      center: 1.77

  soft_matching:
    sigma_branch: 0.06
    sigma_tail: 0.05
    mode: "gaussian_center"

  output:
    root: "runs/M33_V0_alpha_peak_robustness/M35c_soft_branch"
m36a_pair_audit:
  enabled: true

  input:
    packet_fit_best: "runs/M33_V0_alpha_peak_robustness/M35b_packet_kernel/packet_fit_best.csv"
    source_pair_kernel: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/source_pair_kernel_alpha.csv"

  selection:
    audit_cases:
      - {t: 2.0,  p_family: "P1", theta: 1.0e-09}
      - {t: 5.0,  p_family: "P0", theta: 1.0e-09}
      - {t: 40.0, p_family: "P3", theta: 1.0e-09}

  grouping:
    class_modes: ["delta_p", "delta_p2"]

  output:
    root: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit"
m36b_pair_identity:
  enabled: true

  input:
    pair_contributions: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit/pair_contributions.csv"
    pair_top_summary: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit/pair_top_summary.csv"
    pair_class_summary: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit/pair_class_summary.csv"

  selection:
    top_k_values: [1, 3, 5]
    branch_source_column: "branch_pref_readout"

  comparison:
    class_modes: ["delta_p", "delta_p2"]

  output:
    root: "runs/M33_V0_alpha_peak_robustness/M36b_pair_identity"

m36c_branch_expanded:
  enabled: true

  input:
    nearest_branch_assignment: "runs/M33_V0_alpha_peak_robustness/M35c_soft_branch/nearest_branch_assignment.csv"
    soft_branch_scores: "runs/M33_V0_alpha_peak_robustness/M35c_soft_branch/soft_branch_scores.csv"
    soft_branch_summary: "runs/M33_V0_alpha_peak_robustness/M35c_soft_branch/soft_branch_summary.csv"
    pair_contributions: "runs/M33_V0_alpha_peak_robustness/M36a_pair_audit/pair_contributions.csv"
