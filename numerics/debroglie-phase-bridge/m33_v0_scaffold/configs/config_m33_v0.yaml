
project:
  run_id: "M33_V0_alpha_peak_robustness"
  tag: "phase_source_vs_readout"
  seed: 42
  output_root: "./runs/M33_V0_alpha_peak_robustness"

physics:
  hbar: 1.0
  m: 1.0

grid:
  x_min: -40.0
  x_max: 40.0
  nx: 4001
  window:
    type: "gaussian"
    sigma: 8.0
    normalize_weights: true

time_scan:
  enabled: true
  t_values: [0.0, 2.0, 5.0, 10.0, 20.0, 40.0]

alpha_scan:
  coarse:
    alpha_min: 0.3
    alpha_max: 3.0
    alpha_step: 0.1
  refine:
    enabled: true
    center_mode: "fixed"
    fixed_center: 1.6
    half_width: 0.3
    alpha_step: 0.02

p_sets:
  active_families: ["P0", "P1", "P2", "P3"]
  families:
    P0:
      description: "symmetric reference"
      p_values: [-3.0, -2.0, -1.0, 0.0, 1.0, 2.0, 3.0]
    P1:
      description: "mild asymmetric"
      p_values: [-3.0, -2.0, -1.0, 0.0, 1.0, 2.0, 4.0]
    P2:
      description: "strong asymmetric"
      p_values: [-4.0, -2.0, -1.0, 0.0, 1.0, 3.0, 6.0]
    P3:
      description: "affine asymmetric"
      p_values: [-3.0, -1.9, -0.8, 0.0, 1.2, 2.7, 4.4]

graphs:
  theta_scan:
    enabled: true
    theta_values: [1.0e-9, 3.0e-9, 1.0e-8]

phases:
  phi0_mode: "zero"
  phi0_seed: 123
  dispersion:
    mode: "scaled_free"
    formula: "omega_i = alpha * p_i^2 / (2*m)"

kernel:
  build_kbar: true
  kbar_average:
    mode: "weighted_x_average"
  sign_preserving:
    enabled: true
    zero_tolerance: 1.0e-12

graphs:
  theta_scan:
    enabled: true
    theta_values: [0.02, 0.03, 0.05]
  adjacency_modes: ["abs", "positive", "negative"]
  weighted_layer:
    enabled: true
    metrics:
      - "natural_connectivity"
      - "weighted_clustering"
      - "global_efficiency"

source_test:
  enabled: true
  measures:
    - "var_dphi_x"
    - "mean_cos_dphi"
    - "mean_abs_cos_dphi"
    - "kbar_ij"
    - "sign_fraction"
    - "lambda_max_kpos"
    - "lambda_max_kneg"

readout_test:
  enabled: true
  measures:
    - "chi"
    - "rho_pos"
    - "rho_neg"
    - "lambda_max_pos"
    - "lambda_max_neg"
    - "lambda_max_abs"
    - "lambda2_abs"
    - "weighted_clustering_abs"
    - "natural_connectivity_abs"
    - "global_efficiency_abs"

peak_detection:
  edge_exclusion_bins: 1
  prominence_mode: "median_baseline"
  source_peak_band: [1.4, 1.8]
  readout_peak_band: [1.4, 1.8]
  coherence_tol_fine: 0.15
  robust_fraction_min: 0.70

controls:
  require_t0_control: true
  require_nontrivial_p_asymmetry: true
  finite_fraction_min: 1.0
  allow_edge_peaks: false

labels:
  source_labels: ["Q0", "Q1", "Q2", "Q3"]
  robustness_labels: ["R0", "R1", "R2", "R3"]
m34_branch_analysis:
  enabled: true

  input:
    readout_summary: "runs/M33_V0_alpha_peak_robustness/M33_readout_scan/alpha_scan_summary.csv"
    readout_candidates: "runs/M33_V0_alpha_peak_robustness/M33_readout_scan/local_coherence_candidates.csv"
    source_summary: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/source_peak_summary.csv"
    source_kernel: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/kernel_sign_stats.csv"

  selection:
    exclude_t0: true
    candidate_scope: "preferred"   # preferred | band_only | all_band_candidates
    allowed_readout_labels: ["R1", "R3"]
    band_min: 1.3
    band_max: 1.9
    min_coherence_score: null

  branches:
    - id: "B1"
      left: 1.38
      right: 1.46
      center: 1.42
    - id: "B2"
      left: 1.55
      right: 1.66
      center: 1.60
    - id: "B3"
      left: 1.72
      right: 1.82
      center: 1.77

  source_link:
    enabled: true
    alpha_tolerance: 0.12

  thresholds:
    dominant_branch_min_fraction: 0.45
    source_link_min_fraction: 0.60

  output:
    root: "runs/M33_V0_alpha_peak_robustness/M34_branch_scan"

m35a_packet_model:
  enabled: true

  input:
    source_kernel: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/kernel_sign_stats.csv"
    readout_summary: "runs/M33_V0_alpha_peak_robustness/M33_readout_scan/alpha_scan_summary.csv"
    branch_assignment: "runs/M33_V0_alpha_peak_robustness/M34_branch_scan/branch_assignment.csv"

  selection:
    exclude_t0: true
    allowed_readout_labels: ["R1", "R3"]
    source_features: ["neg", "abs"]
    candidate_scope: "preferred"

  packet_model:
    family: "gaussian"
    p0_grid: [-4.0, -3.5, -3.0, -2.5, -2.0, -1.5, -1.0, -0.5, 0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0]
    sigma_p_grid: [0.3, 0.5, 0.8, 1.0, 1.3, 1.7, 2.2, 3.0]
    pair_weight_mode: "product_prob"

  alpha:
    band_min: 1.3
    band_max: 1.9

  source_branches:
    - id: "S1"
      left: 1.38
      right: 1.46
      center: 1.42
    - id: "S2"
      left: 1.55
      right: 1.66
      center: 1.60
    - id: "S3"
      left: 1.72
      right: 1.82
      center: 1.77

  coupling:
    alpha_tolerance: 0.12
    branch_match_weight: 1.0
    alpha_match_weight: 1.0
    source_score_weight: 0.5
    readout_score_weight: 0.5

  thresholds:
    dominant_source_branch_min_fraction: 0.45

  output:
    root: "runs/M33_V0_alpha_peak_robustness/M35a_packet_model"

m35b_pair_kernel_export:
  enabled: true

  input:
    phase_pair_stats: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/phase_pair_stats.csv"

  output:
    pair_kernel_csv: "runs/M33_V0_alpha_peak_robustness/V0_source_scan/source_pair_kernel_alpha.csv"
