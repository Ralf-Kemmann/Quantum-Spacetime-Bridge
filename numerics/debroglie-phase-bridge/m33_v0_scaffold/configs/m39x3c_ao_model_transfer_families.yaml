families:
  - family_id: "ER1_RING"
    family_label: "external_control_ring"
    spectral_type: "type_A_ladder"
    model_class: "ring_schrodinger_quadratic"
    family_source: "M39x_external_reference_wave_1"
    status: "implemented"
    enabled: true
    description: >
      Regular ladder-like ring control case with sign and degeneracy structure.
      Used as primary Type-A prediction anchor.

    base_spectrum:
      variable_name: "p"
      representation: "signed"
      values: [-3, -2, -1, 1, 2, 3]

    derived_spectra:
      - variable_name: "abs_p"
        from: "p"
        transform: "abs"
      - variable_name: "p2"
        from: "p"
        transform: "square"
      - variable_name: "E_quad"
        from: "p"
        transform: "square_over_2m"
        parameters:
          m: 1.0

    branch_target_mode: "inherit_existing_logic"

    prediction_profile:
      expected_relative_winner: "delta_p"
      expected_allowed_winners:
        - "delta_p"
      expected_delta_p2_role: "not_necessarily_dominant"
      expected_irregularity_level: "low_to_moderate"
      expected_direction_blindness_relevant: true
      expected_prediction_status_if_missing_family: "open"

    analysis_variants:
      - variant_id: "RING_SIGNED"
        enabled: true
        pairing_mode: "all_pairs"
        degeneracy_policy:
          treat_sign_as_distinct: true
          collapse_equal_energy_shells: false
          exclude_sign_mirror_pairs: false
        active_spectrum: "p"
        active_markers:
          - "delta_p"
          - "abs_delta_p"
          - "delta_p2"
          - "abs_delta_p2"
          - "delta_E_quad"

      - variant_id: "RING_ABS"
        enabled: true
        pairing_mode: "unique_abs_pairs"
        degeneracy_policy:
          treat_sign_as_distinct: false
          collapse_equal_energy_shells: false
          exclude_sign_mirror_pairs: true
        active_spectrum: "abs_p"
        active_markers:
          - "delta_p"
          - "abs_delta_p"
          - "delta_p2"
          - "abs_delta_p2"
          - "delta_E_quad"

      - variant_id: "RING_DEGEN_SAFE"
        enabled: true
        pairing_mode: "degeneracy_safe_pairs"
        degeneracy_policy:
          treat_sign_as_distinct: false
          collapse_equal_energy_shells: false
          exclude_sign_mirror_pairs: true
        active_spectrum: "p"
        active_markers:
          - "delta_p"
          - "abs_delta_p"
          - "delta_p2"
          - "abs_delta_p2"
          - "delta_E_quad"

  - family_id: "ER2_CAVITY"
    family_label: "external_main_test_cavity"
    spectral_type: "type_C_multiindex_structure"
    model_class: "cavity_helmholtz_linear_energy"
    family_source: "M39x_external_reference_wave_1"
    status: "implemented"
    enabled: true
    description: >
      Rectangular cavity as a multi-index eigenvalue-structure family.

    mode_table:
      type: "rectangular_cavity_modes"
      geometry:
        a: 1.0
        b: 1.5
        d: 2.0
      mode_indices:
        - [1, 1, 1]
        - [1, 1, 2]
        - [1, 2, 1]
        - [2, 1, 1]
        - [2, 2, 1]
        - [2, 1, 2]
        - [1, 2, 2]
        - [2, 2, 2]

    base_spectrum:
      variable_name: "k"
      construction: "from_existing_external_reference_family"

    derived_spectra:
      - variable_name: "k2"
        from: "k"
        transform: "square"
      - variable_name: "omega"
        from: "k"
        transform: "linear_scale"
        parameters:
          factor: 1.0
      - variable_name: "lambda"
        from: "k"
        transform: "square"

    branch_target_mode: "inherit_existing_logic"

    prediction_profile:
      expected_relative_winner: "delta_k2"
      expected_allowed_winners:
        - "delta_k2"
        - "abs_delta_k2"
        - "delta_k"
        - "abs_delta_k"
      expected_delta_p2_role: "structure_support_expected"
      expected_irregularity_level: "moderate"
      expected_direction_blindness_relevant: false
      expected_prediction_status_if_missing_family: "failed"

    analysis_variants:
      - variant_id: "CAVITY_STANDARD"
        enabled: true
        pairing_mode: "all_pairs"
        degeneracy_policy:
          treat_index_permutations_as_distinct: true
          collapse_equal_k_shells: false
        active_spectrum: "k"
        active_markers:
          - "delta_k"
          - "abs_delta_k"
          - "delta_k2"
          - "abs_delta_k2"
          - "delta_omega"
          - "delta_lambda"

  - family_id: "ER3_MEMBRANE"
    family_label: "external_hard_bias_test_membrane"
    spectral_type: "type_C_multiindex_structure"
    model_class: "membrane_helmholtz_bessel"
    family_source: "M39x_external_reference_wave_1"
    status: "implemented"
    enabled: true
    description: >
      Circular membrane with Bessel-zero structure as hard Type-C case.

    mode_table:
      type: "circular_membrane_bessel_modes"
      mode_indices:
        - [0, 1]
        - [1, 1]
        - [2, 1]
        - [0, 2]
        - [3, 1]
        - [1, 2]
        - [2, 2]
        - [0, 3]

    base_spectrum:
      variable_name: "k"
      construction: "from_existing_external_reference_family"

    derived_spectra:
      - variable_name: "k2"
        from: "k"
        transform: "square"
      - variable_name: "lambda"
        from: "k"
        transform: "square"
      - variable_name: "omega"
        from: "k"
        transform: "linear_scale"
        parameters:
          factor: 1.0

    branch_target_mode: "inherit_existing_logic"

    prediction_profile:
      expected_relative_winner: "delta_k2"
      expected_allowed_winners:
        - "delta_k2"
        - "abs_delta_k2"
        - "delta_lambda"
        - "delta_k"
      expected_delta_p2_role: "structure_support_expected"
      expected_irregularity_level: "moderate_to_high"
      expected_direction_blindness_relevant: false
      expected_prediction_status_if_missing_family: "failed"

    analysis_variants:
      - variant_id: "MEMBRANE_STANDARD"
        enabled: true
        pairing_mode: "all_pairs"
        degeneracy_policy:
          treat_bessel_near_clusters_as_distinct: true
          collapse_equal_lambda_shells: false
        active_spectrum: "k"
        active_markers:
          - "delta_k"
          - "abs_delta_k"
          - "delta_k2"
          - "abs_delta_k2"
          - "delta_lambda"

  - family_id: "TD1_1D_BOX"
    family_label: "type_D_primary_1d_box"
    spectral_type: "type_D_regular_nonring"
    model_class: "box_1d_quadratic_nonperiodic"
    family_source: "M39x3_control_extension"
    status: "implemented"
    enabled: true
    description: >
      Regular non-ring control case: 1D particle in a box.
      Used as Type-D reference for model-transfer evaluation.

    candidate_role: "reference"
    candidate_rationale: >
      Clean regular control spectrum without periodicity and without ring-specific structure.
    type_hardening_question: >
      Does the AO sweep remain distinguishable from this regular non-ring baseline?

    base_spectrum:
      variable_name: "p"
      representation: "positive_only"
      values: [1, 2, 3, 4, 5, 6]

    derived_spectra:
      - variable_name: "p2"
        from: "p"
        transform: "square"
      - variable_name: "E_quad"
        from: "p"
        transform: "square_over_2m"
        parameters:
          m: 1.0

    branch_target_mode: "inherit_existing_logic"

    prediction_profile:
      expected_relative_winner: "delta_p"
      expected_allowed_winners:
        - "delta_p"
        - "abs_delta_p"
      expected_delta_p2_role: "not_necessarily_dominant"
      expected_irregularity_level: "low_to_moderate"
      expected_direction_blindness_relevant: false
      expected_prediction_status_if_missing_family: "failed"

    analysis_variants:
      - variant_id: "BOX_STANDARD"
        enabled: true
        pairing_mode: "all_pairs"
        degeneracy_policy:
          treat_sign_as_distinct: false
          collapse_equal_energy_shells: false
          exclude_sign_mirror_pairs: true
        active_spectrum: "p"
        active_markers:
          - "delta_p"
          - "abs_delta_p"
          - "delta_p2"
          - "abs_delta_p2"
          - "delta_E_quad"

  - family_id: "TB2_FINITE_SQUARE_WELL_1D_SWEEP"
    family_label: "type_B_primary_finite_square_well_sweep"
    spectral_type: "type_B_quadratic_nontrivial"
    model_class: "finite_square_well_1d"
    family_source: "M39x3b_standard_model_sweep"
    status: "implemented"
    enabled: true
    description: >
      Finite-square-well sweep retained as primary Type-B reference family for
      model-transfer comparison against the anharmonic oscillator.

    candidate_role: "primary_reference_sweep"

    fixed_parameters:
      well_width: 1.0
      mass: 1.0

    sweep_regimes:
      - regime_id: "FSW_DEEP"
        regime_label: "deep_box_like"
        well_depth: 12.0
        expectation: "box_like_type_D_proximity"
        base_spectrum:
          variable_name: "p"
          values: [0.98, 1.96, 2.93, 3.88, 4.80, 5.67]

      - regime_id: "FSW_INTERMEDIATE"
        regime_label: "intermediate_type_B_window"
        well_depth: 6.0
        expectation: "best_type_B_window"
        base_spectrum:
          variable_name: "p"
          values: [0.92, 1.84, 2.69, 3.42, 3.98, 4.31]

      - regime_id: "FSW_SHALLOW"
        regime_label: "shallow_edge_case"
        well_depth: 3.0
        expectation: "edge_case_nontriviality"
        base_spectrum:
          variable_name: "p"
          values: [0.81, 1.55, 2.18, 2.66, 2.97, 3.10]

  - family_id: "TB3_ANHARMONIC_OSCILLATOR_1D_SWEEP"
    family_label: "type_B_reserve_anharmonic_oscillator_sweep"
    spectral_type: "type_B_quadratic_nontrivial"
    model_class: "anharmonic_oscillator_1d"
    family_source: "M39x3c_transfer_check"
    status: "implemented"
    enabled: true
    description: >
      Second standard 1D Type-B model family used as model-transfer check against
      the finite-square-well Type-B window.

    candidate_role: "reserve_transfer_check"
    candidate_rationale: >
      Tests whether the Type-B signal seen in the finite square well transfers to
      a distinct 1D model family or remains finite-square-well-specific so far.
    type_hardening_question: >
      Does the anharmonic oscillator reproduce the same quantitative intermediate
      Type-B pattern as FSW_INTERMEDIATE, or does it show a qualitative difference?

    fixed_parameters:
      mass: 1.0
      omega0: 1.0

    sweep_regimes:
      - regime_id: "AO_WEAK"
        regime_label: "weak_near_regular"
        anharmonic_strength: 0.05
        expectation: "near_regular_with_first_type_B_signal"
        base_spectrum:
          variable_name: "p"
          values: [1.00, 2.04, 3.12, 4.24, 5.40, 6.60]

      - regime_id: "AO_INTERMEDIATE"
        regime_label: "intermediate_transfer_candidate"
        anharmonic_strength: 0.12
        expectation: "best_transfer_candidate"
        base_spectrum:
          variable_name: "p"
          values: [1.00, 2.08, 3.28, 4.62, 6.12, 7.80]

      - regime_id: "AO_STRONG"
        regime_label: "strong_edge_case"
        anharmonic_strength: 0.22
        expectation: "strong_nontriviality_edge_case"
        base_spectrum:
          variable_name: "p"
          values: [1.00, 2.16, 3.58, 5.34, 7.52, 10.18]