run:
  run_id: "M39x3_prediction_matrix_hardening"
  title: "M.3.9x.3 — Typ-B-/Typ-D-Kontrollfälle und Härtung der Vorhersagematrix"
  description: >
    Hardening run for the prediction matrix by adding explicit Type-B and Type-D
    control cases and evaluating them with predeclared decision rules.
  outdir: "runs/M39x3_prediction_matrix_hardening"
  random_seed: 1729
  overwrite: true

inputs:
  family_definitions_yaml: "configs/m39x3_prediction_matrix_families.yaml"

execution:
  enabled_blocks:
    - family_diagnostics
    - prediction_evaluation
    - spectral_type_summary
    - control_hardening_rules
    - cross_type_evaluation
  stop_on_error: true
  log_level: "INFO"

reporting:
  require_family_prediction_summary: true
  require_spectral_type_summary: true
  require_missing_cases_summary: true
  require_control_hardening_summary: true
  global_prediction_status_allowed_values:
    - "prediction_matrix_supported"
    - "prediction_matrix_partially_supported"
    - "prediction_matrix_stressed"
    - "prediction_matrix_failed"
    - "prediction_matrix_strengthened"
    - "prediction_matrix_still_partial"
    - "prediction_matrix_stressed_by_controls"
    - "prediction_matrix_revised"

pairing:
  default_pairing_mode: "all_pairs"
  supported_pairing_modes:
    - "all_pairs"
    - "matched_pairs"
    - "nearest_pairs"
    - "degeneracy_safe_pairs"
    - "unique_abs_pairs"
    - "no_sign_mirror_pairs"
  defaults:
    exclude_self_pairs: true
    sort_pairs_canonically: true
    unique_unordered_pairs: true

markers:
  supported_markers:
    - "delta_p"
    - "abs_delta_p"
    - "delta_p2"
    - "abs_delta_p2"
    - "delta_E_quad"
    - "delta_k"
    - "abs_delta_k"
    - "delta_k2"
    - "abs_delta_k2"
    - "delta_omega"
    - "delta_lambda"

  default_marker_sets:
    type_A_ladder:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
      - "delta_E_quad"

    type_B_quadratic_nontrivial:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
      - "delta_E_quad"

    type_C_multiindex_structure:
      - "delta_k"
      - "abs_delta_k"
      - "delta_k2"
      - "abs_delta_k2"
      - "delta_omega"
      - "delta_lambda"

    type_D_regular_nonring:
      - "delta_p"
      - "abs_delta_p"
      - "delta_p2"
      - "abs_delta_p2"
      - "delta_E_quad"

strength_scoring:
  absolute_strength:
    method: "rank_separation_score"
    higher_is_better: true
    normalize_to_unit_interval: true

  relative_dominance:
    method: "bootstrap_win_fraction"
    higher_is_better: true

  support_thresholds:
    absolute_support_min: 0.60
    dominance_stable_min: 0.70
    dominance_margin_min: 0.05
    competitive_margin_max: 0.10

bootstrap:
  enabled: true
  n_bootstrap: 1000
  resample_level: "pair"
  confidence_level: 0.95
  stratified_by_branch_label: false

irregularity:
  enabled: true
  compute_measures:
    - "spacing_mean"
    - "spacing_std"
    - "spacing_cv"
    - "spacing_ratio"
    - "simple_unfolding_density"
    - "simple_rigidity_surrogate"

irregularity_levels:
  low:
    spacing_cv_max: 0.20
  low_to_moderate:
    spacing_cv_max: 0.45
  moderate:
    spacing_cv_min: 0.15
    spacing_cv_max: 0.60
  moderate_to_high:
    spacing_cv_min: 0.20
  high:
    spacing_cv_min: 0.50

prediction_logic:
  allowed_match_status_values:
    - "supported"
    - "partially_supported"
    - "open"
    - "stressed"
    - "failed"

  supported_rules:
    require_expected_relative_winner: true
    allow_expected_allowed_winners: true
    check_delta_p2_role: true
    check_irregularity_level: true
    check_direction_blindness_relevance: true

  default_open_conditions:
    - "family_status_placeholder"
    - "missing_control_case"
    - "insufficient_data"

derived_flags:
  type_B:
    - "delta_p2_relative_gain_vs_type_A"
    - "observed_irregularity_level"
    - "behavior_matches_type_D_too_closely"

  type_D:
    - "delta_p_competitive"
    - "delta_p2_absolute_strength_high"
    - "delta_p2_not_clearly_dominant"
    - "observed_irregularity_level"

  cross_type:
    - "type_B_relative_winner"
    - "type_D_relative_winner"
    - "type_B_irregularity_level"
    - "type_D_irregularity_level"
    - "type_B_prediction_match_status"
    - "type_D_prediction_match_status"
    - "type_B_behavior_matches_type_D_too_closely"

decision_rules:
  type_B_quadratic_nontrivial:
    family_id: "TB1_1D_BOX_WEAKLY_DEFORMED"

    support_conditions:
      strong_support:
        all_of:
          - "relative_winner in [delta_p2, abs_delta_p2]"
          - "delta_p2_relative_gain_vs_type_A > 0"
          - "observed_irregularity_level in [moderate, moderate_to_high]"

      partial_support:
        all_of:
          - "relative_winner in [delta_p, abs_delta_p, delta_p2, abs_delta_p2]"
          - "delta_p2_relative_gain_vs_type_A >= 0"
        not_all_of:
          - "relative_winner in [delta_p2, abs_delta_p2]"
          - "observed_irregularity_level in [moderate, moderate_to_high]"

    stress_conditions:
      stressed:
        any_of:
          - "relative_winner in [delta_p, abs_delta_p] and delta_p2_relative_gain_vs_type_A == 0"
          - "observed_irregularity_level == low_to_moderate"
          - "behavior_matches_type_D_too_closely == true"

    falsification_conditions:
      falsified:
        all_of:
          - "relative_winner in [delta_p, abs_delta_p]"
          - "delta_p2_relative_gain_vs_type_A <= 0"
          - "behavior_matches_type_D_too_closely == true"
          - "observed_irregularity_level in [low, low_to_moderate]"

    output_mapping:
      strong_support: "supported"
      partial_support: "partially_supported"
      stressed: "stressed"
      falsified: "failed"
      fallback: "open"

  type_D_regular_nonring:
    family_id: "TD1_1D_BOX"

    support_conditions:
      strong_support:
        any_of:
          - "relative_winner in [delta_p, abs_delta_p]"
          - "relative_winner in [delta_p, abs_delta_p] and delta_p2_absolute_strength_high == true"

      partial_support:
        all_of:
          - "relative_winner in [delta_p, abs_delta_p, delta_p2, abs_delta_p2]"
        any_of:
          - "delta_p_competitive == true"
          - "delta_p2_not_clearly_dominant == true"

    stress_conditions:
      stressed:
        any_of:
          - "relative_winner in [delta_p2, abs_delta_p2] and delta_p_competitive == true"
          - "observed_irregularity_level == low and relative_winner in [delta_p2, abs_delta_p2]"

    falsification_conditions:
      falsified:
        all_of:
          - "relative_winner in [delta_p2, abs_delta_p2]"
          - "delta_p_competitive == false"
          - "observed_irregularity_level in [low, low_to_moderate]"

    output_mapping:
      strong_support: "supported"
      partial_support: "partially_supported"
      stressed: "stressed"
      falsified: "failed"
      fallback: "open"

cross_type_rules:
  type_B_vs_type_D:
    intended_relation: "distinguishable"

    stress_conditions:
      stressed:
        any_of:
          - "type_B_relative_winner == type_D_relative_winner and type_B_irregularity_level == type_D_irregularity_level"
          - "type_B_prediction_match_status == type_D_prediction_match_status == partially_supported"
          - "type_B_behavior_matches_type_D_too_closely == true"

    falsification_conditions:
      falsified:
        all_of:
          - "type_B_relative_winner in [delta_p, abs_delta_p]"
          - "type_D_relative_winner in [delta_p, abs_delta_p]"
          - "type_B_delta_p2_relative_gain_vs_type_A <= 0"
          - "type_B_irregularity_level == type_D_irregularity_level"

    output_mapping:
      stressed: "prediction_matrix_stressed_by_controls"
      falsified: "prediction_matrix_revised"
      fallback: "no_cross_type_alarm"

control_hardening:
  enabled: true

  type_A_reference_family: "ER1_RING"
  type_A_reference_variant: "RING_SIGNED"

  type_B_primary_family: "TB1_1D_BOX_WEAKLY_DEFORMED"
  type_D_primary_family: "TD1_1D_BOX"

  helper_semantics:
    delta_p2_relative_gain_vs_type_A: >
      Compare type-B delta_p2 relative position against the declared Type-A reference,
      using bootstrap win fraction first, then relative rank as tie-breaker.

    delta_p_competitive: >
      True if delta_p or abs_delta_p is top-2, or if dominance margin to the winner
      is below the configured competitive threshold.

    delta_p2_absolute_strength_high: >
      True if absolute_strength(delta_p2 or abs_delta_p2) >= absolute_support_min.

    delta_p2_not_clearly_dominant: >
      True if delta_p2/abs_delta_p2 is not top-1 with a dominance margin above dominance_margin_min.

    behavior_matches_type_D_too_closely: >
      True if Type-B and Type-D share winner family, similar irregularity level,
      and no visible delta_p2 gain over Type-A.

missing_case_policy:
  count_missing_type_B_as_open: false
  count_missing_type_D_as_open: false
  never_count_missing_cases_as_supported: true

global_decision_logic:
  prediction_matrix_strengthened:
    require:
      - "type_B_primary_present"
      - "type_D_primary_present"
      - "no_failed_core_prediction"
      - "no_cross_type_alarm"
      - "at_least_one_new_control_supported"

  prediction_matrix_still_partial:
    require:
      - "no_failed_core_prediction"
    allow_any:
      - "type_B_only_partially_supported"
      - "type_D_only_partially_supported"
      - "some_open_predictions"

  prediction_matrix_stressed_by_controls:
    trigger_any:
      - "type_B_failed"
      - "type_D_failed"
      - "cross_type_alarm"

  prediction_matrix_revised:
    trigger_any:
      - "type_D_falsifies_general_regularity_reading"
      - "type_B_collapses_into_type_D"
      - "multiple_control_failures"

outputs:
  markdown_report: "m39x3_prediction_matrix_report.md"
  global_summary_json: "m39x3_global_summary.json"
  family_prediction_summary_csv: "m39x3_family_prediction_summary.csv"
  spectral_type_summary_csv: "m39x3_spectral_type_summary.csv"
  marker_summary_csv: "m39x3_marker_summary.csv"
  irregularity_summary_csv: "m39x3_irregularity_summary.csv"
  bootstrap_summary_csv: "m39x3_bootstrap_summary.csv"
  missing_cases_summary_csv: "m39x3_missing_cases_summary.csv"
  control_hardening_summary_csv: "m39x3_control_hardening_summary.csv"
  source_notes_md: "m39x3_source_notes.md"
  