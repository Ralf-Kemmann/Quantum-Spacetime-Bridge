families:
  - family_id: "ER1_RING"
    family_type: "ring"
    source_model: "free_particle_on_ring"
    description: "Freies Teilchen auf einem Ring als externer Sanity-/Kontrollfall"
    role_hint: "external_control"
    notes: >
      Direkte diskrete Impuls-Eigenwerte aus periodischer Randbedingung.
      Dient als sauberer externer Kontroll- und Pipeline-Check.

    parameters:
      hbar: 1.0
      L: 1.0
      m_min: -3
      m_max: 3
      exclude_zero_mode: false

    generation:
      mode: "direct_p_from_ring_quantization"
      formula: "p_m = hbar * 2*pi*m / L"

    ordering:
      mode: "ascending_p2"
      tie_break_rule: "lexicographic_mode_label"

    pairing:
      mode: "index_rule"
      index_rule: "adjacent_m"

    mode_labels:
      - "m=-3"
      - "m=-2"
      - "m=-1"
      - "m=0"
      - "m=1"
      - "m=2"
      - "m=3"

  - family_id: "ER2_CAVITY"
    family_type: "rectangular_cavity"
    source_model: "rectangular_em_cavity_resonator"
    description: "Rechteckiger EM-Hohlraumresonator als externer Haupttest"
    role_hint: "external_main_test"
    notes: >
      Multi-Index-Familie mit geometriesteuerbarer Spektralstruktur.
      Dient als realistischer externer Haupttest gegen Konstruktionsbias.

    parameters:
      hbar: 1.0
      a: 1.0
      b: 1.3
      d: 1.7
      max_m: 2
      max_n: 2
      max_p: 2
      exclude_zero_triplet: true

    generation:
      mode: "proxy_p2_from_cavity_k2"
      formula: "p2_mnp = hbar^2 * ((m*pi/a)^2 + (n*pi/b)^2 + (p*pi/d)^2)"
      mode_filter: "exclude_000"

    ordering:
      mode: "ascending_p2"
      tie_break_rule: "lexicographic_mode_label"

    pairing:
      mode: "sorted_neighbor"

    mode_labels:
      - "m=0,n=0,p=1"
      - "m=0,n=0,p=2"
      - "m=0,n=1,p=0"
      - "m=0,n=1,p=1"
      - "m=0,n=1,p=2"
      - "m=0,n=2,p=0"
      - "m=0,n=2,p=1"
      - "m=0,n=2,p=2"
      - "m=1,n=0,p=0"
      - "m=1,n=0,p=1"
      - "m=1,n=0,p=2"
      - "m=1,n=1,p=0"
      - "m=1,n=1,p=1"
      - "m=1,n=1,p=2"
      - "m=1,n=2,p=0"
      - "m=1,n=2,p=1"
      - "m=1,n=2,p=2"
      - "m=2,n=0,p=0"
      - "m=2,n=0,p=1"
      - "m=2,n=0,p=2"
      - "m=2,n=1,p=0"
      - "m=2,n=1,p=1"
      - "m=2,n=1,p=2"
      - "m=2,n=2,p=0"
      - "m=2,n=2,p=1"
      - "m=2,n=2,p=2"

  - family_id: "ER3_MEMBRANE"
    family_type: "circular_membrane"
    source_model: "circular_membrane_bessel_modes"
    description: "Kreisförmige Membran über Bessel-Nullstellen als harter externer Bias-Test"
    role_hint: "external_hard_bias_test"
    notes: >
      Nicht-polynomialer Spektralraum über Bessel-Nullstellen.
      Dient als härtester externer Test gegen Konstruktions- und Ordering-Bias.

    parameters:
      hbar: 1.0
      radius: 1.0
      max_m: 2
      max_n: 3

    generation:
      mode: "proxy_p2_from_bessel_zeros"
      formula: "p2_mn = hbar^2 * x_mn^2 / radius^2"
      bessel_zero_table:
        m0: [2.4048255577, 5.5200781103, 8.6537279129]
        m1: [3.8317059702, 7.0155866698, 10.1734681351]
        m2: [5.1356223018, 8.4172441404, 11.6198411721]

    ordering:
      mode: "ascending_p2"
      tie_break_rule: "lexicographic_mode_label"

    pairing:
      mode: "index_rule"
      index_rule: "fixed_m_adjacent_n"

    mode_labels:
      - "m=0,n=1"
      - "m=0,n=2"
      - "m=0,n=3"
      - "m=1,n=1"
      - "m=1,n=2"
      - "m=1,n=3"
      - "m=2,n=1"
      - "m=2,n=2"
      - "m=2,n=3"