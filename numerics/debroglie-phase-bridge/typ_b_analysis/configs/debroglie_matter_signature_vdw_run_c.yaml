run_id: debroglie_matter_signature_vdw_run_c

species_list:
  - hydrogen
  - sodium
  - carbon
  - nitrogen
  - sulfur
  - phosphorus

conditions:
  temperature_C: 20.0
  pressure_mbar: 1013.0
  volume_m3: 1.0

model_assumptions:
  species_mode: atomic_species
  gas_model: van_der_waals
  velocity_model: rms
  frequency_mode: kinetic_energy_based
  density_mode: corrected_density
  vdw_mode: simple_ab

surrogates:
  wave_enabled:
    - length_scale_score
    - energy_score
    - occupancy_score
  vdw_enabled:
    - interaction_score
    - excluded_volume_score
    - vdw_signature_score
  combined_mode: weighted_sum
  weights:
    wave: 1.0
    vdw: 0.5

tau_grid:
  - 0.001
  - 0.01
  - 0.1
  - 1.0

comparison:
  compare_against_reference: true
  reference_run_id: debroglie_matter_signature_vdw_run_a
  compute_tau_alignment_score: true
  compute_matter_sensitive_delta: true
  compute_matter_sensitive_delta_vdw: true
  compare_combined_vs_wave: true

output:
  base_dir: results/debroglie_matter_signature_vdw
  write_state_json: true
  write_readout_md: true
  write_scan_csv: true
  write_claims_json: true
  write_tau_response_csv: true
