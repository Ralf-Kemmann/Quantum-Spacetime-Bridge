run:
  run_id: "n1_negative_vs_abs_v1"
  seed: 123
  output_dir: "results/n1_negative_vs_abs_v1"
  overwrite: false

inputs:
  dataset_roots:
    - "../results/a1_probe/k0"
    - "../results/a1_sign_scan/k0/theta_0.03"
    - "../results/a1_probe/n1a_alpha"
  export_classes:
    - "negative"
    - "abs"
    - "positive"
  export_pattern: "*.npz"
  search_mode: "recursive"

pair_unit:
  enabled: true
  source: "matrix_adapter_v22"
  matrix_pair_mode: "adjacency_plus_threshold"

  matrix_fields:
    adjacency: "adjacency"
    primary_score: "G"
    secondary_score: "kbar"
    edge_length: "edge_length"
    d_rel: "d_rel"

  threshold:
    enabled: true
    tau: 0.025
    score_field: "G"
    use_absolute_value: true

  weights:
    use_edge_length_as_weight: true
    fallback_weight_field: "G"

baseline:
  neighborhood:
    mode: "shared_endpoint"
    directed: false

alternative:
  neighborhood:
    mode: "graph_distance_1"
    directed: false
    require_mutual: false

a1:
  enabled: true
  stabilization_ceiling: 0.95
  neighbor_min: 3
  late_stage_rule: "reformed"

b1:
  enabled: true
  conflict_penalty: 1.0

decision:
  enabled: true
  launchability:
    min_pair_units: 1
    min_local_shells: 1

specificity:
  enabled: true

  compare_classes:
    left: "negative"
    right: "abs"

  structure_metrics:
    - "pair_unit_count"
    - "shell_count"
    - "mean_neighbor_count"

  channel_metrics:
    - "a1_score_mean"
    - "b1_score_mean"
    - "a1_status"
    - "b1_status"

  combined_metrics:
    - "combined_status"

  status_rank:
    not_applicable: -1
    inactive: 0
    weak: 1
    partial: 2
    active: 3

  combined_rank:
    boundary_non_launchable: 0
    weak_launchable_boundary: 1
    structured_intermediate: 2
    robust_dual: 3
    inconclusive: -1
    degenerate: -2

  rules:
    require_nonnegative_delta_for_structural_advantage: true
    require_nonnegative_delta_for_channel_advantage: true
    allow_tie_as_explicit_outcome: true

reporting:
  write_summary_json: true
  write_per_dataset_csv: true
  write_metrics_csv: true
  write_readout_md: true

validation:
  strict_export_class_presence: true
  fail_on_empty_input: true
  fail_on_nan_metrics: true