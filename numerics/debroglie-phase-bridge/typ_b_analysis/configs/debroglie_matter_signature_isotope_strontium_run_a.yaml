run_id: debroglie_matter_signature_isotope_strontium_run_a

isotope_list:
  - 84Sr
  - 86Sr
  - 87Sr
  - 88Sr

conditions:
  temperature_C: 20.0
  pressure_mbar: 1013.0
  volume_m3: 1.0

model_assumptions:
  species_mode: isotope_series
  gas_model: ideal_gas
  velocity_model: rms
  frequency_mode: none
  density_mode: ideal_gas_number_density
  isotope_mode: wave_only

surrogates:
  wave_enabled:
    - length_scale_score
    - energy_score
    - occupancy_score
  combined_mode: weighted_sum
  weights:
    wave: 1.0
    qc_valence: 0.0
    qc_shell: 0.0

output:
  base_dir: results/debroglie_matter_signature_isotope_strontium
  write_state_json: true
  write_readout_md: true
  write_scan_csv: true
  write_claims_json: true
