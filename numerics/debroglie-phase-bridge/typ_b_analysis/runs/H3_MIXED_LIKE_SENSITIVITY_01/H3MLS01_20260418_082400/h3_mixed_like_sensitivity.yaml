block_id: "H3_MIXED_LIKE_SENSITIVITY_01"
block_version: "v1"
source_block: "H3_SUPPORT_MANIPULATION_DESIGN_01"

description: >
  Sensitivitätstest für die Behandlung von mixed_like-Paaren.
  Prüft, ob der lokale support-side Befund stabil bleibt, wenn mixed_like
  als neutral, boundary-like oder support-like behandelt wird.

data_inputs:
  support_score_table_path: "data/original/h3_support_scores.csv"

mapping_modes:
  M0:
    label: "mixed_as_neutral"
    support_rule: "support_like"
    neighbor_rule: "boundary_like"

  M1:
    label: "mixed_as_boundary"
    support_rule: "support_like"
    neighbor_rule: "boundary_like_or_mixed_like"

  M2:
    label: "mixed_as_support"
    support_rule: "support_like_or_mixed_like"
    neighbor_rule: "boundary_like"

states:
  A:
    label: "baseline_reference"
    reading_mode: "baseline"
    support_manipulation:
      type: "none"
      level: 0.0

  B:
    label: "mild_auxiliary"
    reading_mode: "baseline_plus_auxiliary"
    support_manipulation:
      type: "axis_defined_manipulation"
      axis: "support_weighting"
      level: 0.35

  C:
    label: "stronger_support_manipulation"
    reading_mode: "baseline_plus_auxiliary"
    support_manipulation:
      type: "axis_defined_manipulation"
      axis: "support_weighting"
      level: 0.70

  D1:
    label: "permutation_null"
    reading_mode: "baseline_plus_auxiliary"
    support_manipulation:
      type: "null_model"
      variant: "permutation_null"

  D2:
    label: "topology_preserving_random_null"
    reading_mode: "baseline_plus_auxiliary"
    support_manipulation:
      type: "null_model"
      variant: "topology_preserving_random_null"

replication:
  seeds: [101, 202, 303, 404, 505]
  run_all_states_per_seed: true
  parameter_perturbations:
    enabled: true
    perturbation_profiles:
      base:
        factor: 1.00
      mild_plus:
        factor: 1.05
      mild_minus:
        factor: 0.95

metrics:
  numeric:
    - "gain_value"
    - "gain_vs_A"
    - "gain_vs_D"
    - "support_sep_baseline"
    - "support_sep_combined"
    - "null_noise_margin"
  categorical:
    - "baseline_anchor_status"
    - "combined_status_stability"
    - "auxiliary_compatibility"
    - "neighbor_shift_signal"
    - "a1_shift_signal"
    - "b1_shift_signal"

decision_rules:
  baseline_first_preserved: true
  monotone_support_scaling: true
  null_model_suppression: true
  boundedness_preserved: true

outputs:
  root_dir: "runs/H3_MIXED_LIKE_SENSITIVITY_01/{run_id}"
  files:
    - "state_metrics.csv"
    - "mixed_like_sensitivity_summary.csv"
    - "mixed_like_sensitivity_decision_summary.json"
    - "mixed_like_sensitivity_readout.md"
    - "run_metadata.json"